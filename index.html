    <!-- Theme Script - Must run first to prevent flash -->
    <script>
      // Synchronously set theme class before first paint to prevent flash
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
